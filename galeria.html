<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoNuestro</title>
  <link rel="stylesheet" href="css/estiloGaleria.css">
  <!-- Conectamos el archivo CSS con la etiqueta link -->
  <!-- href indica la ruta del archivo desde index.html -->
 
  <!--
  <link rel="stylesheet" href="css/estilos.css" />
-->
</head>

<body>
  <!-- HEADER: barra superior con nombre de la tienda y botón del carrito -->
  <header>
     <button id="btn-inicio" onclick="window.location.href='index.html';" >
      inicio
    </button>
    <h1>🍽️LoNuestro🍖</h1>
    <!-- El botón del carrito: el badge muestra el número de productos -->
    <button id="btn-carrito">
      🛒 Carrito
      <span id="contador-badge">0</span>
    </button>

  </header>
  <!-- MAIN: sección principal de la página -->

  <main>
    <div class="seccion-titulo">
      <h2>Nuestros Productos</h2>
      <p>Comida Colombiana.</p>
    </div>

    <!-- GALERÍA: este div empieza VACÍO en el HTML -->
    <!-- JavaScript lo llenará con las cards de cada producto -->
    <!-- El id="galeria" es el "punto de entrada" que usará el JS -->
    
    <div id="galeria"></div>
  </main>

  <!-- Conectamos el JS al FINAL del body (¡importante! así el HTML ya cargó) -->
  <!-- src indica la ruta del archivo desde index.html -->

  <!-- <script src="js/app.js"></script> -->
<script src="js/data.js"> </script>
<script src="js/galeria.js"></script>

</body>
</html>
